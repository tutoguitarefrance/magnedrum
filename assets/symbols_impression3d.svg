<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 590"
     width="110mm" height="295mm"
     font-family="system-ui, sans-serif">

  <!-- ══════════════════════════════════════════════════════════
       CHIP 1 — HH · Charleston · #1A7FAA
       ══════════════════════════════════════════════════════════ -->
  <g transform="translate(30, 20)">

    <!-- Cadre chip (instrChip : borderRadius 10, borderColor, bg 13%) -->
    <rect x="0" y="0" width="160" height="162" rx="13" ry="13"
          fill="#1A7FAA1F" stroke="#1A7FAA" stroke-width="3.5"/>

    <!-- Zone circulaire blanche -->
    <circle cx="80" cy="76" r="62" fill="#F8F5EE"/>

    <!-- ── Hi-Hat SVG (centré sur 80,76) ── -->
    <g transform="translate(80,76)" stroke="#3a2010" stroke-linecap="round" stroke-linejoin="round" fill="none">

      <!-- Tige verticale centrale -->
      <line x1="0" y1="-56" x2="0" y2="40" stroke-width="3"/>

      <!-- Mécanisme haut (clutch) -->
      <rect x="-8" y="-60" width="16" height="10" rx="3" stroke-width="2"/>
      <rect x="-4" y="-66" width="8" height="8" rx="2" stroke-width="2"/>

      <!-- Cymbale supérieure (grande, plate) -->
      <ellipse cx="0" cy="-26" rx="36" ry="8.5" stroke-width="2.8"/>
      <!-- Coupole centrale de la cymbale -->
      <ellipse cx="0" cy="-27.5" rx="7" ry="4" stroke-width="2"/>

      <!-- Cymbale inférieure (plus petite, relevée) -->
      <ellipse cx="0" cy="-14" rx="28" ry="6.5" stroke-width="2.5"/>
      <!-- Rebord relevé de la cymbale basse -->
      <path d="M-28,-14 C-28,-9 28,-9 28,-14" stroke-width="1.5"/>

      <!-- Trépied — 3 pieds -->
      <line x1="0"   y1="40" x2="-30" y2="54" stroke-width="3"/>
      <line x1="0"   y1="40" x2=" 30" y2="54" stroke-width="3"/>
      <line x1="0"   y1="40" x2="  0" y2="56" stroke-width="3"/>

      <!-- Patins de pied -->
      <line x1="-36" y1="54" x2="-24" y2="54" stroke-width="3.5"/>
      <line x1=" 24" y1="54" x2=" 36" y2="54" stroke-width="3.5"/>
      <line x1=" -6" y1="56" x2="  6" y2="56" stroke-width="3.5"/>
    </g>

    <!-- Étiquette -->
    <text x="80" y="152" text-anchor="middle"
          fill="#1A7FAA" font-size="14" font-weight="700" letter-spacing="0.5">Charleston</text>

    <!-- Barre de volume (pleine = 100%) -->
    <rect x="22" y="157" width="116" height="4" rx="2" fill="#1A7FAA33"/>
    <rect x="22" y="157" width="116" height="4" rx="2" fill="#1A7FAA"/>
  </g>


  <!-- ══════════════════════════════════════════════════════════
       CHIP 2 — SN · Caisse Claire · #CC4400
       ══════════════════════════════════════════════════════════ -->
  <g transform="translate(30, 204)">

    <rect x="0" y="0" width="160" height="162" rx="13" ry="13"
          fill="#CC44001F" stroke="#CC4400" stroke-width="3.5"/>

    <circle cx="80" cy="76" r="62" fill="#F8F5EE"/>

    <!-- ── Caisse Claire SVG ── -->
    <g transform="translate(80,76)" stroke="#3a2010" stroke-linecap="round" stroke-linejoin="round" fill="none">

      <!-- Peau du dessus (ellipse) -->
      <ellipse cx="0" cy="-22" rx="40" ry="10" stroke-width="2.8"/>

      <!-- Corps du tambour (côtés verticaux) -->
      <line x1="-40" y1="-22" x2="-40" y2="22" stroke-width="2.5"/>
      <line x1=" 40" y1="-22" x2=" 40" y2="22" stroke-width="2.5"/>

      <!-- Peau du dessous -->
      <ellipse cx="0" cy="22" rx="40" ry="10" stroke-width="2.8"/>

      <!-- Tirants (lugs) — gauche -->
      <rect x="-47" y="-16" width="9" height="8" rx="2" fill="#3a2010" stroke="none"/>
      <rect x="-47" y=" -4" width="9" height="8" rx="2" fill="#3a2010" stroke="none"/>
      <rect x="-47" y="  8" width="9" height="8" rx="2" fill="#3a2010" stroke="none"/>

      <!-- Tirants (lugs) — droite -->
      <rect x="38" y="-16" width="9" height="8" rx="2" fill="#3a2010" stroke="none"/>
      <rect x="38" y=" -4" width="9" height="8" rx="2" fill="#3a2010" stroke="none"/>
      <rect x="38" y="  8" width="9" height="8" rx="2" fill="#3a2010" stroke="none"/>

      <!-- Fils de caisse (snare wires) — 5 cordes sur la peau du bas -->
      <line x1="-28" y1="22" x2="-28" y2="32" stroke-width="1.2"/>
      <line x1="-14" y1="22" x2="-14" y2="32" stroke-width="1.2"/>
      <line x1="  0" y1="22" x2="  0" y2="32" stroke-width="1.2"/>
      <line x1=" 14" y1="22" x2=" 14" y2="32" stroke-width="1.2"/>
      <line x1=" 28" y1="22" x2=" 28" y2="32" stroke-width="1.2"/>
      <line x1="-30" y1="32" x2=" 30" y2="32" stroke-width="2"/>

      <!-- Mécanisme tendeur (strainer) — côté droit -->
      <rect x="40" y="14" width="14" height="8" rx="2" stroke-width="2"/>
      <line x1="54" y1="18" x2="58" y2="18" stroke-width="2"/>
    </g>

    <text x="80" y="152" text-anchor="middle"
          fill="#CC4400" font-size="14" font-weight="700" letter-spacing="0.5">Caisse Claire</text>

    <rect x="22" y="157" width="116" height="4" rx="2" fill="#CC440033"/>
    <rect x="22" y="157" width="116" height="4" rx="2" fill="#CC4400"/>
  </g>


  <!-- ══════════════════════════════════════════════════════════
       CHIP 3 — BD · Grosse Caisse · #AA8800
       ══════════════════════════════════════════════════════════ -->
  <g transform="translate(30, 388)">

    <rect x="0" y="0" width="160" height="162" rx="13" ry="13"
          fill="#AA88001F" stroke="#AA8800" stroke-width="3.5"/>

    <circle cx="80" cy="76" r="62" fill="#F8F5EE"/>

    <!-- ── Grosse Caisse SVG ── -->
    <g transform="translate(80,76)" stroke="#3a2010" stroke-linecap="round" stroke-linejoin="round" fill="none">

      <!-- Corps de la grosse caisse (grand cercle) -->
      <circle cx="0" cy="-6" r="42" stroke-width="3"/>
      <!-- Bague intérieure (peau) -->
      <circle cx="0" cy="-6" r="35" stroke-width="1.8"/>

      <!-- Pied gauche (L-frame) -->
      <line x1="-22" y1="36" x2="-36" y2="52" stroke-width="3"/>
      <line x1="-36" y1="52" x2="-50" y2="52" stroke-width="3.5"/>

      <!-- Pied droit (L-frame) -->
      <line x1=" 22" y1="36" x2=" 36" y2="52" stroke-width="3"/>
      <line x1=" 36" y1="52" x2=" 50" y2="52" stroke-width="3.5"/>

      <!-- Pédale (centre bas) -->
      <line x1="0" y1="36" x2="0" y2="50" stroke-width="2.5"/>
      <line x1="-10" y1="50" x2="10" y2="50" stroke-width="3"/>
      <!-- Battant de pédale -->
      <line x1="0" y1="36" x2="8" y2="50" stroke-width="2"/>

      <!-- Petits détails : vis de cerclage haut/bas -->
      <circle cx="-42" cy="-6" r="3" fill="#3a2010" stroke="none"/>
      <circle cx=" 42" cy="-6" r="3" fill="#3a2010" stroke="none"/>
      <circle cx="0"   cy="-48" r="3" fill="#3a2010" stroke="none"/>
      <circle cx="0"   cy=" 36" r="3" fill="#3a2010" stroke="none"/>
    </g>

    <text x="80" y="152" text-anchor="middle"
          fill="#AA8800" font-size="14" font-weight="700" letter-spacing="0.5">Grosse Caisse</text>

    <rect x="22" y="157" width="116" height="4" rx="2" fill="#AA880033"/>
    <rect x="22" y="157" width="116" height="4" rx="2" fill="#AA8800"/>
  </g>

</svg>
